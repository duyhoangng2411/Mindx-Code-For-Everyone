<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3-LT</title>
    <!-- <link rel="stylesheet" href="./style-L3-LT.css"> -->
    <style>
        .box{
            width: 200px;
            height: 200px;
            padding: 10px 20px;
            /* padding: 10px: top right bottom left
            padding: 10px 20px: (top/bottom) = 10px (right/left) = 20px */
            border: 10px solid red;
            margin: 30px;
            /* position: static; ko điều chỉnh đc top right bottom left và z trong dòng chảy.
            position: relative; điều chỉnh đc top right bottom left và z trong dòng chảy.
            position: absolute; đặt ngoài dòng chảy.
            position: fixed; cố định khi cuộn trang.
            position: sticky; dính vào vị trí đến 1 vị trí nào đó khi cuộn trang.
            */
        }

        .box.box-1{
            background-color: blue;
            position: absolute;
            top: 200px;
            left: 50px;
            /* z-index: 1; */
        }

        .box.box-2{
            background-color: green;
        }

        .box.box-3{
            background-color: orange;
        }

        .scrTop{
            position: fixed;
            right: 50px;
            bottom: 100px;
        }

    </style>

</head>
<body>
    <div class="box box-1">Box 1</div>
    <div class="box box-2">Box 2</div>
    <div class="box box-3">Box 3</div>
    <button <div class="scrTop">Scroll to Top</div></button>
</body>
</html>
