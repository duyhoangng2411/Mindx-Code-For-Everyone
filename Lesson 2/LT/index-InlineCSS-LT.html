<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Example</title>
    <!-- Viết mã nguồn css trực tiếp vào thẻ HTML phần Body  -->

</head>

<body>
    <h2 style="color: red; text-decoration: underline;">Hôm nay chúng ta sẽ học CSS.</h2>
    <h3 style="text-transform: uppercase; color: blue; cursor: pointer;">Alo 1,2,3,4</h3>
    <h4 style="color: green; font-size: 30px;">Hôm nay chúng ta sẽ học CSS.</h4>
    <p style="color: yellow; background-color: red;">xin chào mọi người nhé!</p>
</body>

</html>
